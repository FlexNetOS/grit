name: PR Target Branch Check

on:
  pull_request_target:
    types: [opened, edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  check-target:
    runs-on: ubuntu-latest
    # Only flag PRs targeting master that don't come from develop. develop->master
    # PRs are the maintainer release path and must not be flagged.
    if: >-
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.head.ref != 'develop'
    steps:
      - name: Add wrong-base label and comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['wrong-base'],
            });

            const body = `Thanks for the PR! It looks like this targets \`master\`, but contributor PRs should target the **\`develop\`** branch.

            \`master\` is reserved for stable releases (only \`develop\` -> \`master\` PRs cut by maintainers via release-please).

            To fix:
            1. Click **Edit** at the top right of this PR
            2. Change the base branch from \`master\` to \`develop\`

            See \`docs/RELEASE_FLOW.md\` for the release flow.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
